          const tB = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : new Date(b.createdAt).getTime()) : 0;
          return tB - tA;
        });
      } catch (err) {
        console.warn("Fetch failed, attempting fallback query without sorting:", err);
        const snap = await getDocs(collection(db, colName));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
    }

          document.body.classList.add('ready');
          renderMainView();
          observeReveal();
          updateCartBadge();
          updateWishlistBadge();

          console.warn("Failed to parse cached products/categories:", err);

      // 2. Fetch fresh data in the background (will load instantly from Firestore offline cache if available)
      try {
        let p = await fetchCollection('products');
        let c = await fetchCollection('categories');

        // Seed demo products if not already present
        const hasDemo = p.some(prod => prod.name === "The Midnight Library");
        if (!hasDemo) {
          console.log("Demo products not found in Firestore. Seeding...");
          await seedDemoData();
          p = await fetchCollection('products');
          c = await fetchCollection('categories');
        }

        // Check if the data has actually changed before triggering a DOM update
        const dataChanged = JSON.stringify(p) !== JSON.stringify(products) || JSON.stringify(c) !== JSON.stringify(categories);

        products = p;
        categories = c;
        categories.forEach(cat => categoryMap[cat.id] = cat.name);

        // Cache the fresh data
        localStorage.setItem('shobdotori_cached_products', JSON.stringify(p));
        localStorage.setItem('shobdotori_cached_categories', JSON.stringify(c));

        loadFooterSocials();

        if (dataChanged || !cachedProducts) {
          document.body.classList.add('ready');
          renderMainView();
          observeReveal();
          updateCartBadge();
          updateWishlistBadge();
        }

    // ── THREE.JS HERO DRONE CONTROLLER (CONFLIT-FREE SMOOTH ROAMING) ──
    let heroDroneGroup = null;
    let heroDrone = null;
    let heroMixer = null;
    let heroPropellers = [];

    function initHeroDrone() {
      const container = document.getElementById('drone-hero-canvas-container');
      if (!container) return;

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 0, 10);

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.innerHTML = '';
      container.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      // Parent Group to avoid AnimationMixer clashing/stuttering
      heroDroneGroup = new THREE.Group();
      scene.add(heroDroneGroup);

      const loader = new THREE.GLTFLoader();

      loader.load('drone.glb', function (gltf) {
        heroDrone = gltf.scene;

        // Add drone model inside the parent group
        heroDroneGroup.add(heroDrone);

        // Initial scale and settings
        heroDrone.scale.set(1.4, 1.4, 1.4);
        if (window.innerWidth < 768) {
          heroDrone.scale.set(0.7, 0.7, 0.7);
        }
        // Grab propellers
        heroPropellers = [];
        heroDrone.traverse((child) => {
          if (child.isMesh && (
            child.name.toLowerCase().includes('propeller') ||
            child.name.toLowerCase().includes('rotor') ||
            child.name.toLowerCase().includes('fan') ||
            child.name.toLowerCase().includes('blade') ||
            child.name.toLowerCase().includes('wing')
          )) {
            heroPropellers.push(child);
          }
        });

        // Run custom GLTF animations if bundled (propeller spins, etc)
        if (gltf.animations && gltf.animations.length > 0) {
          heroMixer = new THREE.AnimationMixer(heroDrone);
          gltf.animations.forEach((clip) => {
            heroMixer.clipAction(clip).play();
          });
        }
      }, undefined, function (error) {
        console.warn('Hero drone load skipped or file missing:', error);
      });

      const clock = new THREE.Clock();
      let isHeroSceneVisible = true;
      const observer = new IntersectionObserver(entries => {
        isHeroSceneVisible = entries[0].isIntersecting;
      });
      observer.observe(container);

      function animate() {
        requestAnimationFrame(animate);
        if (!isHeroSceneVisible) return;

        const delta = clock.getDelta();
        const time = clock.getElapsedTime();

        // Local keyframe update
        if (heroMixer) heroMixer.update(delta);

        // Manual high speed propeller rotations
        heroPropellers.forEach(prop => {
          prop.rotation.y += 0.35;
        });

        // Parent group transformations for smooth, conflict-free roaming
        if (heroDroneGroup && heroDrone) {
          const isMobile = window.innerWidth < 768;

          const basePosX = isMobile ? 0 : 2.2;
          const basePosY = isMobile ? -0.9 : 0.4;
          const basePosZ = isMobile ? -1.5 : 0;

          // Smooth flying/roaming translations
          const targetX = basePosX + Math.sin(time * 0.4) * (isMobile ? 1.0 : 2.2);
          const targetY = basePosY + Math.cos(time * 0.6) * (isMobile ? 0.3 : 0.5);
          const targetZ = basePosZ + Math.sin(time * 0.3) * (isMobile ? 0.4 : 0.8);

          // Interpolate with Lerp
          heroDroneGroup.position.x = THREE.MathUtils.lerp(heroDroneGroup.position.x, targetX, 0.05);
          heroDroneGroup.position.y = THREE.MathUtils.lerp(heroDroneGroup.position.y, targetY, 0.05);
          heroDroneGroup.position.z = THREE.MathUtils.lerp(heroDroneGroup.position.z, targetZ, 0.05);

          // Continuous 360 degree rotation on Y-axis
          heroDroneGroup.rotation.y = (time * 0.25);

          // Aerodynamic tilting (banking/flying animations)
          heroDroneGroup.rotation.x = Math.sin(time * 0.6) * 0.12;
          heroDroneGroup.rotation.z = Math.cos(time * 0.6) * 0.12;
        }

        renderer.render(scene, camera);
      }
      animate();

      const resizeObserver = new ResizeObserver(() => {
        if (container.clientWidth === 0 || container.clientHeight === 0) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });
      resizeObserver.observe(container);
    }

          </div>
        </div>`;

      const callOpenRouterAPI = async (userText) => {
        if (!CHAT_API_KEY) {
          aiChatHistory.push({ role: "assistant", content: "Error: AI chatbot key is not configured." });
          renderAiChat();
          return;

        // typing indicator
        const loaderEl = document.createElement('div');

        loaderEl.innerHTML = `

      </div>`;
        cont.appendChild(loaderEl);

        try {
          const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${CHAT_API_KEY}`,
              "Content-Type": "application/json",
              "HTTP-Referer": window.location.origin, // Optional but recommended by OpenRouter
              "X-Title": "Shobdotori Bookstore"
            },
            body: JSON.stringify({
              model: CHAT_MODEL,
              messages: [
                { role: "system", content: "You are Shobdotori Bookstore AI Assistant. Answer questions beautifully, help pick books based on author or name, and keep responses short and friendly in English." },
                ...aiChatHistory.filter(h => h.role !== 'assistant' || (h.content && !h.content.includes("Error")))
              ]
            })
          });

          const data = await response.json();
          // remove loader
          if (loaderEl.parentNode) loaderEl.remove();

          // proper error handling for OpenRouter API response
          if (data && data.choices && data.choices.length > 0 && data.choices[0].message) {
            const botResponse = data.choices[0].message.content;
            aiChatHistory.push({ role: "assistant", content: botResponse });
          } else if (data && data.error) {
            aiChatHistory.push({ role: "assistant", content: `Error from AI: ${data.error.message || 'Unknown error'}` });
          } else {
            aiChatHistory.push({ role: "assistant", content: "Sorry, I received an invalid response. Please check the API key or model ID." });
          }
        } catch (err) {
          console.error(err);
          if (loaderEl.parentNode) loaderEl.remove();
          aiChatHistory.push({ role: "assistant", content: "Sorry, I am facing connectivity issues. Please try again later." });
        } finally {
          renderAiChat();
        }
      };

      const sendMessage = async () => {
        const text = overlay.querySelector('#chat-input-overlay').value.trim();
        if (!text) return;
        overlay.querySelector('#chat-input-overlay').value = '';

      overlay.querySelector('#chat-input-overlay').onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

    function observeReveal() {
      if (revealObserver) revealObserver.disconnect();
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.reveal-on-scroll').forEach(el => revealObserver.observe(el));
    }

          showAlert('Password reset link has been sent to your email.');
        } catch (err) {
          showAlert(authErrorMsg(err.code));
        }
      };
    };

    function setupUI() {
      $('#cart-btn').onclick = renderCartOverlay;
      $('#wishlist-btn').onclick = renderWishlistOverlay;
      $('#chat-btn').onclick = openChatOverlay;
      $('#track-btn').onclick = window.openTracking;
      $('#profile-btn').onclick = window.openProfileOverlay;
    }

    function updateProfileUI() {
      const badge = $('#user-profile-badge');
      if (currentUser && badge) {
        badge.classList.remove('hidden');
        badge.classList.add('flex');
      } else if (badge) {
        badge.classList.add('hidden');
        badge.classList.remove('flex');
      }
    }

    async function init() {
      setupUI();
      onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        updateProfileUI();
        if (user) {
          await loadUserData();
        } else {
          userDocRef = null;
        }
      });
      await loadAllData();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
